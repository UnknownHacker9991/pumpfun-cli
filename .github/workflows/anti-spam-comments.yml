name: Remove spam comments and PRs

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, edited]

permissions:
  issues: write
  pull-requests: write

jobs:
  delete-spam-comment:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body || '';
            const spamPatterns = [
              /Submitted via GitHub Bounty Hunter/i,
              /Payment Details/i,
              /Wallet Address:\s*T[A-Za-z0-9]{33}/i,
              /USDT\s*\(TRC20\)/i,
              /Platform:\s*OKX/i,
            ];
            if (spamPatterns.some(p => p.test(body))) {
              const isReview = context.eventName === 'pull_request_review_comment';
              if (isReview) {
                await github.rest.pulls.deleteReviewComment({
                  ...context.repo,
                  comment_id: context.payload.comment.id,
                });
              } else {
                await github.rest.issues.deleteComment({
                  ...context.repo,
                  comment_id: context.payload.comment.id,
                });
              }
              console.log(`Deleted spam comment ${context.payload.comment.id} by ${context.payload.comment.user.login}`);
            }

  close-spam-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const spamPatterns = [
              /Submitted via GitHub Bounty Hunter/i,
              /Payment Details/i,
              /Wallet Address:\s*T[A-Za-z0-9]{33}/i,
              /USDT\s*\(TRC20\)/i,
              /Platform:\s*OKX/i,
            ];
            if (spamPatterns.some(p => p.test(body))) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.payload.pull_request.number,
                body: 'Closed as spam.',
              });
              await github.rest.pulls.update({
                ...context.repo,
                pull_number: context.payload.pull_request.number,
                state: 'closed',
              });
              console.log(`Closed spam PR #${context.payload.pull_request.number} by ${context.payload.pull_request.user.login}`);
            }
